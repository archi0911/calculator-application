<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator Application</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <script src="script.js"></script>
  <div class="form-container">
    <h2>Basic Calculator</h2>
    <form id="calculator">
      <input type="text" id="field">
      <!-- <p id="field"></p> -->
      <div>
        <button type="button" id="seven" value="7" onclick="calculator(this)">7</button>
        <button type="button" id="eight" value="8" onclick="calculator(this)">8</button>
        <button type="button" id="nine" value="9" onclick="calculator(this)">9</button>
        <button type="button" id="division" value="/" onclick="calculator(this)">/</button>     
      </div>

      <div>
        <button type="button" id="four" value="4" onclick="calculator(this)">4</button>
        <button type="button" id="five" value="5" onclick="calculator(this)">5</button>
        <button type="button" id="six" value="6" onclick="calculator(this)">6</button>
        <button type="button" id="multiplication" value="*" onclick="calculator(this)">*</button>
      </div>

      <div>
        <button type="button" id="one" value="1" onclick="calculator(this)">1</button>
        <button type="button" id="two" value="2" onclick="calculator(this)">2</button>
        <button type="button" id="three" value="3" onclick="calculator(this)">3</button>
        <button type="button" id="subtraction" value="-" onclick="calculator(this)">-</button>
      </div>

      <div>
        <button type="reset" id="clear">Clear</button>
        <button type="button" id="zero" value="0" onclick="calculator(this)">0</button>
        <button type="button" id="equal" value="=" onclick="calculateExpression()">=</button>
        <button type="button" id="addition" value="+" onclick="calculator(this)">+</button>
      </div>
    </form>
  </div>

</body>
</html>
